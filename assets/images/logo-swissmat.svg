<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200">
  <!-- House roof -->
  <polyline points="10,95 80,25 150,95" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- House walls -->
  <line x1="25" y1="85" x2="25" y2="140" stroke="#1a1a1a" stroke-width="3.5"/>
  <line x1="135" y1="85" x2="135" y2="140" stroke="#1a1a1a" stroke-width="3.5"/>
  <line x1="25" y1="140" x2="135" y2="140" stroke="#1a1a1a" stroke-width="3.5"/>
  <!-- Swiss cross inside -->
  <rect x="67" y="62" width="26" height="64" rx="2" fill="#1a1a1a"/>
  <rect x="48" y="81" width="64" height="26" rx="2" fill="#1a1a1a"/>
  <!-- Text: SwissMAT -->
  <text x="80" y="168" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="1" fill="#1a1a1a">SwissMAT</text>
  <!-- Text: SÀRL -->
  <text x="80" y="188" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="300" letter-spacing="6" fill="#1a1a1a">S À R L</text>
</svg>