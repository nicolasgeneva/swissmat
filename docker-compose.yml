services:
  nginx:
    image: nginx:alpine
    container_name: swissmat-nginx
    ports:
      - "8140:80"
    volumes:
      - ./site:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    image: php:8.3-fpm-alpine
    container_name: swissmat-php
    volumes:
      - ./site:/var/www/html
    restart: unless-stopped
